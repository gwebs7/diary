<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 플래너 - 달력 일정 관리 앱</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter & Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- React & Babel CDN for elegant single-file client application -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans KR', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar styling for slick look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-200 dark:bg-slate-900 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 기본 제공 카테고리 정의
        const CATEGORIES = {
            work: { id: 'work', label: '업무', color: 'bg-blue-500 text-white border-blue-600', dot: 'bg-blue-500', text: 'text-blue-600 dark:text-blue-400', bg: 'bg-blue-50 dark:bg-blue-950/30' },
            personal: { id: 'personal', label: '개인', color: 'bg-emerald-500 text-white border-emerald-600', dot: 'bg-emerald-500', text: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-950/30' },
            family: { id: 'family', label: '가족', color: 'bg-pink-500 text-white border-pink-600', dot: 'bg-pink-500', text: 'text-pink-600 dark:text-pink-400', bg: 'bg-pink-50 dark:bg-pink-950/30' },
            learning: { id: 'learning', label: '학습', color: 'bg-purple-500 text-white border-purple-600', dot: 'bg-purple-500', text: 'text-purple-600 dark:text-purple-400', bg: 'bg-purple-50 dark:bg-purple-950/30' },
            other: { id: 'other', label: '기타', color: 'bg-amber-500 text-white border-amber-600', dot: 'bg-amber-500', text: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-950/30' }
        };

        const INITIAL_EVENTS = [
            {
                id: '1',
                title: '프로젝트 런칭 회의 🚀',
                date: new Date().toISOString().split('T')[0],
                startTime: '10:00',
                endTime: '11:30',
                category: 'work',
                location: '대회의실 A',
                desc: '주요 마일스톤 점검 및 론칭 스케줄 확인'
            },
            {
                id: '2',
                title: '가족 저녁 식사 🍕',
                date: new Date().toISOString().split('T')[0],
                startTime: '18:35',
                endTime: '20:30',
                category: 'family',
                location: '강남 파스타집',
                desc: '부모님 생신 축하 기념 식사'
            },
            {
                id: '3',
                title: '리액트 컴포넌트 마스터하기 💻',
                date: new Date(Date.now() + 86400000).toISOString().split('T')[0], // 내일
                startTime: '14:00',
                endTime: '16:00',
                category: 'learning',
                location: '내 방 서재',
                desc: '고급 최적화 훅 사용법 완벽 숙지하기'
            },
            {
                id: '4',
                title: '정기 치과 검진 🦷',
                date: new Date(Date.now() - 86400000).toISOString().split('T')[0], // 어제
                startTime: '11:00',
                endTime: '12:00',
                category: 'personal',
                location: '튼튼치과의원',
                desc: '스케일링 예약일'
            }
        ];

        // 요일 상수 정의 (일요일 시작)
        const DAYS_OF_WEEK = ['일', '월', '화', '수', '목', '금', '토'];

        function App() {
            // 상태값 관리
            const [currentDate, setCurrentDate] = useState(new Date());
            const [events, setEvents] = useState(() => {
                const saved = localStorage.getItem('smart_calendar_events');
                return saved ? JSON.parse(saved) : INITIAL_EVENTS;
            });
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [viewMode, setViewMode] = useState('month'); // 'month' | 'week' | 'day'
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategories, setSelectedCategories] = useState(Object.keys(CATEGORIES));
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const savedMode = localStorage.getItem('theme');
                return savedMode ? savedMode === 'dark' : false;
            });
            const [toastMessage, setToastMessage] = useState('');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // 모달 상태
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingEvent, setEditingEvent] = useState(null);
            
            // 모달 입력 필드
            const [eventTitle, setEventTitle] = useState('');
            const [eventDate, setEventDate] = useState('');
            const [eventStartTime, setEventStartTime] = useState('09:00');
            const [eventEndTime, setEventEndTime] = useState('10:00');
            const [eventCategory, setEventCategory] = useState('work');
            const [eventLocation, setEventLocation] = useState('');
            const [eventDesc, setEventDesc] = useState('');

            // 다크모드 적용 효과
            useEffect(() => {
                const root = window.document.documentElement;
                if (isDarkMode) {
                    root.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    root.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            // 로컬스토리지에 일정 저장 효과
            useEffect(() => {
                localStorage.setItem('smart_calendar_events', JSON.stringify(events));
            }, [events]);

            // 메시지 알림(토스트) 트리거 함수
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => {
                    setToastMessage('');
                }, 3000);
            };

            // 특정 월의 정보 계산 함수들
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
            const getFirstDayOfMonth = (y, m) => new Date(y, m, 1).getDay();

            // 이전/다음 월/일/주 이동 함수
            const navigateDate = (direction) => {
                const nextDate = new Date(currentDate);
                if (viewMode === 'month') {
                    nextDate.setMonth(currentDate.getMonth() + direction);
                } else if (viewMode === 'week') {
                    nextDate.setDate(currentDate.getDate() + (direction * 7));
                } else {
                    nextDate.setDate(currentDate.getDate() + direction);
                }
                setCurrentDate(nextDate);
                setSelectedDate(nextDate);
            };

            const goToToday = () => {
                const today = new Date();
                setCurrentDate(today);
                setSelectedDate(today);
            };

            // 검색어 및 필터링된 일정 목록 추출
            const filteredEvents = useMemo(() => {
                return events.filter(event => {
                    const matchCategory = selectedCategories.includes(event.category);
                    const matchSearch = event.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                        event.location.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        event.desc.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchCategory && matchSearch;
                }).sort((a, b) => {
                    // 날짜 순 정렬, 날짜 같으면 시간 순
                    if (a.date !== b.date) return new Date(a.date) - new Date(b.date);
                    return a.startTime.localeCompare(b.startTime);
                });
            }, [events, searchQuery, selectedCategories]);

            // 특정 날짜에 해당하는 일정 필터링
            const getEventsForDate = (dateStr) => {
                return filteredEvents.filter(event => event.date === dateStr);
            };

            // 일정 생성/수정 모달 열기
            const openAddModal = (dateObj, existingEvent = null) => {
                if (existingEvent) {
                    setEditingEvent(existingEvent);
                    setEventTitle(existingEvent.title);
                    setEventDate(existingEvent.date);
                    setEventStartTime(existingEvent.startTime);
                    setEventEndTime(existingEvent.endTime);
                    setEventCategory(existingEvent.category);
                    setEventLocation(existingEvent.location || '');
                    setEventDesc(existingEvent.desc || '');
                } else {
                    setEditingEvent(null);
                    setEventTitle('');
                    const formattedDate = dateObj ? dateObj.toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
                    setEventDate(formattedDate);
                    setEventStartTime('09:00');
                    setEventEndTime('10:00');
                    setEventCategory('work');
                    setEventLocation('');
                    setEventDesc('');
                }
                setIsModalOpen(true);
            };

            // 일정 저장 처리
            const handleSaveEvent = (e) => {
                e.preventDefault();
                if (!eventTitle.trim()) {
                    showToast('⚠️ 일정 제목을 입력해 주세요.');
                    return;
                }
                if (eventStartTime > eventEndTime) {
                    showToast('⚠️ 시작 시간은 종료 시간보다 빠를 수 없습니다.');
                    return;
                }

                if (editingEvent) {
                    // 수정 모드
                    setEvents(prev => prev.map(ev => 
                        ev.id === editingEvent.id 
                            ? { ...ev, title: eventTitle, date: eventDate, startTime: eventStartTime, endTime: eventEndTime, category: eventCategory, location: eventLocation, desc: eventDesc }
                            : ev
                    ));
                    showToast('📝 일정이 수정되었습니다.');
                } else {
                    // 추가 모드
                    const newEvent = {
                        id: Date.now().toString(),
                        title: eventTitle,
                        date: eventDate,
                        startTime: eventStartTime,
                        endTime: eventEndTime,
                        category: eventCategory,
                        location: eventLocation,
                        desc: eventDesc
                    };
                    setEvents(prev => [...prev, newEvent]);
                    showToast('📅 일정이 추가되었습니다.');
                }
                setIsModalOpen(false);
            };

            // 일정 삭제 처리
            const handleDeleteEvent = (eventId) => {
                setEvents(prev => prev.filter(ev => ev.id !== eventId));
                showToast('🗑️ 일정이 삭제되었습니다.');
                setIsModalOpen(false);
            };

            // 카테고리 필터 토글
            const toggleCategoryFilter = (catId) => {
                setSelectedCategories(prev => 
                    prev.includes(catId) 
                        ? prev.filter(id => id !== catId)
                        : [...prev, catId]
                );
            };

            // 캘린더 그리드 생성용 도우미 데이터
            const calendarCells = useMemo(() => {
                const totalDays = getDaysInMonth(year, month);
                const firstDayIndex = getFirstDayOfMonth(year, month);
                const prevMonthDays = getDaysInMonth(year, month - 1);
                const cells = [];

                // 1. 이전 달 날짜 채우기
                for (let i = firstDayIndex - 1; i >= 0; i--) {
                    const prevDate = new Date(year, month - 1, prevMonthDays - i);
                    cells.push({
                        date: prevDate,
                        isCurrentMonth: false,
                        isToday: false,
                        dayNum: prevMonthDays - i
                    });
                }

                // 2. 이번 달 날짜 채우기
                const todayStr = new Date().toISOString().split('T')[0];
                for (let d = 1; d <= totalDays; d++) {
                    const thisDate = new Date(year, month, d);
                    const thisDateStr = thisDate.toISOString().split('T')[0];
                    cells.push({
                        date: thisDate,
                        isCurrentMonth: true,
                        isToday: thisDateStr === todayStr,
                        dayNum: d
                    });
                }

                // 3. 다음 달 날짜 채우기
                const totalCellsUsed = cells.length;
                const remainingCells = 42 - totalCellsUsed; // 6행 7열 기준 채우기
                for (let d = 1; d <= remainingCells; d++) {
                    const nextDate = new Date(year, month + 1, d);
                    cells.push({
                        date: nextDate,
                        isCurrentMonth: false,
                        isToday: false,
                        dayNum: d
                    });
                }

                return cells;
            }, [year, month]);

            // 주간 보기 일자 산출 (선택한 날짜 기준 앞뒤 요일 매칭)
            const weekDays = useMemo(() => {
                const base = new Date(currentDate);
                const dayIndex = base.getDay(); // 0 (일) - 6 (토)
                const startOfWeek = new Date(base);
                startOfWeek.setDate(base.getDate() - dayIndex);

                const weekArr = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(startOfWeek.getDate() + i);
                    weekArr.push(d);
                }
                return weekArr;
            }, [currentDate]);

            // 다가올 미래의 주요 일정 5개
            const upcomingEvents = useMemo(() => {
                const todayStr = new Date().toISOString().split('T')[0];
                return events
                    .filter(ev => ev.date >= todayStr)
                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .slice(0, 5);
            }, [events]);

            return (
                <div className="min-h-screen flex flex-col antialiased">
                    
                    {/* 알림 토스트 */}
                    {toastMessage && (
                        <div className="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-950 px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 animate-bounce border border-slate-700/30">
                            <span className="text-sm font-medium">{toastMessage}</span>
                        </div>
                    )}

                    {/* 상단 통합 헤더 영역 */}
                    <header className="sticky top-0 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 px-4 py-3 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                            {/* 모바일 사이드바 토글 버튼 */}
                            <button 
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="md:hidden p-2 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-100 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                                </svg>
                            </button>
                            {/* 브랜드 로고 */}
                            <div className="flex items-center space-x-2">
                                <div className="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-brand-500/20">
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <span className="font-bold text-lg tracking-tight hidden sm:block bg-gradient-to-r from-brand-600 to-indigo-500 bg-clip-text text-transparent dark:from-indigo-400 dark:to-purple-400">
                                    스마트 플래너
                                </span>
                            </div>
                        </div>

                        {/* 글로벌 검색창 */}
                        <div className="flex-1 max-w-md mx-4 hidden md:block">
                            <div className="relative">
                                <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 pointer-events-none">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </span>
                                <input
                                    type="text"
                                    placeholder="일정 검색 (제목, 위치, 설명 등)..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 dark:focus:ring-brand-500/50 transition-all text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500"
                                />
                            </div>
                        </div>

                        {/* 라이트/다크 및 액션 버튼들 */}
                        <div className="flex items-center space-x-3">
                            <button
                                onClick={() => setIsDarkMode(!isDarkMode)}
                                className="p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                                title={isDarkMode ? "라이트 모드" : "다크 모드"}
                            >
                                {isDarkMode ? (
                                    <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z" clipRule="evenodd" />
                                    </svg>
                                ) : (
                                    <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                                    </svg>
                                )}
                            </button>

                            <button
                                onClick={() => openAddModal(selectedDate)}
                                className="flex items-center space-x-1.5 px-4 py-2 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-700 hover:to-indigo-700 text-white rounded-xl shadow-md hover:shadow-brand-500/20 active:scale-95 transition-all text-sm font-semibold"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" />
                                </svg>
                                <span>새 일정</span>
                            </button>
                        </div>
                    </header>

                    {/* 메인 레이아웃 본문 */}
                    <div className="flex-1 flex overflow-hidden">
                        
                        {/* 사이드바 영역 */}
                        <aside className={`
                            fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 p-5 transform transition-transform duration-300 md:translate-x-0 md:static md:z-auto shrink-0 flex flex-col justify-between
                            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}
                        `}>
                            <div>
                                <div className="flex items-center justify-between mb-6 md:hidden">
                                    <span className="font-bold text-lg text-brand-600 dark:text-indigo-400">메뉴</span>
                                    <button 
                                        onClick={() => setSidebarOpen(false)}
                                        className="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>

                                {/* 모바일 검색창 대용 */}
                                <div className="mb-6 md:hidden">
                                    <div className="relative">
                                        <span className="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                            </svg>
                                        </span>
                                        <input
                                            type="text"
                                            placeholder="일정 검색..."
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                            className="w-full pl-9 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm"
                                        />
                                    </div>
                                </div>

                                {/* 미니 달력 표시 */}
                                <div className="mb-6">
                                    <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3">빠른 선택</h3>

                                        <button 
                                            onClick={() => openAddModal(selectedDate)}
                                            className="text-xs font-bold text-brand-600 dark:text-indigo-400 hover:underline"
                                        >
                                            + 추가하기
                                        </button>
                                    </div>
                                    <div className="space-y-2">
                                        {getEventsForDate(selectedDate.toISOString().split('T')[0]).length === 0 ? (
                                            <p className="text-xs text-slate-400 dark:text-slate-500 italic py-2">등록된 일정이 없습니다. 달력 날짜를 더블클릭하거나 추가 버튼을 누르세요.</p>
                                        ) : (
                                            getEventsForDate(selectedDate.toISOString().split('T')[0]).map(ev => {
                                                const cat = CATEGORIES[ev.category];
                                                return (
                                                    <div 
                                                        key={ev.id}
                                                        onClick={() => openAddModal(null, ev)}
                                                        className="p-3 rounded-xl bg-slate-50 hover:bg-slate-100 dark:bg-slate-800/60 dark:hover:bg-slate-800 flex items-center justify-between transition-all cursor-pointer border-l-4"
                                                        style={{ borderLeftColor: ev.category === 'work' ? '#3b82f6' : ev.category === 'personal' ? '#10b981' : ev.category === 'family' ? '#ec4899' : ev.category === 'learning' ? '#a855f7' : '#f59e0b' }}
                                                    >
                                                        <div>
                                                            <p className="text-sm font-bold text-slate-800 dark:text-slate-200">{ev.title}</p>
                                                            <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5">
                                                                {ev.startTime} - {ev.endTime} {ev.location && `| 📍 ${ev.location}`}
                                                            </p>
                                                        </div>
                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${cat.color}`}>{cat.label}</span>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>

                    {/* 일정 추가/수정 모달 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            {/* 백드롭 차단 */}
                            <div 
                                onClick={() => setIsModalOpen(false)}
                                className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm"
                            />
                            
                            {/* 모달 창 본체 */}
                            <div className="relative bg-white dark:bg-slate-900 w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-in fade-in zoom-in duration-200 flex flex-col">
                                <header className="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/50">
                                    <h3 className="text-lg font-extrabold text-slate-900 dark:text-slate-100">
                                        {editingEvent ? '📝 일정 수정하기' : '📅 새 일정 추가'}
                                    </h3>
                                    <button 
                                        onClick={() => setIsModalOpen(false)}
                                        className="p-1 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 text-slate-400 hover:text-slate-600 transition-colors"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </header>

                                <form onSubmit={handleSaveEvent} className="p-6 space-y-4 overflow-y-auto max-h-[75vh]">
                                    {/* 일정 제목 */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">일정명 *</label>
                                        <input
                                            type="text"
                                            required
                                            value={eventTitle}
                                            onChange={(e) => setEventTitle(e.target.value)}
                                            placeholder="예: 주간 회의, 마트 장보기 등"
                                            className="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none dark:text-slate-100"
                                        />
                                    </div>

                                    {/* 날짜 및 시간 영역 */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">날짜</label>
                                            <input
                                                type="date"
                                                required
                                                value={eventDate}
                                                onChange={(e) => setEventDate(e.target.value)}
                                                className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-slate-100"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">시작 시간</label>
                                            <input
                                                type="time"
                                                required
                                                value={eventStartTime}
                                                onChange={(e) => setEventStartTime(e.target.value)}
                                                className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-slate-100"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">종료 시간</label>
                                            <input
                                                type="time"
                                                required
                                                value={eventEndTime}
                                                onChange={(e) => setEventEndTime(e.target.value)}
                                                className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-slate-100"
                                            />
                                        </div>
                                    </div>

                                    {/* 카테고리 컬러 셀렉터 */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">카테고리</label>
                                        <div className="grid grid-cols-5 gap-2">
                                            {Object.values(CATEGORIES).map(cat => (
                                                <button
                                                    key={cat.id}
                                                    type="button"
                                                    onClick={() => setEventCategory(cat.id)}
                                                    className={`
                                                        py-2 rounded-xl text-xs font-bold text-center border transition-all
                                                        ${eventCategory === cat.id 
                                                            ? `${cat.color} border-slate-700 dark:border-slate-100 scale-105 shadow-md` 
                                                            : 'bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-100'}
                                                    `}
                                                >
                                                    {cat.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 장소 */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">장소 (선택)</label>
                                        <input
                                            type="text"
                                            value={eventLocation}
                                            onChange={(e) => setEventLocation(e.target.value)}
                                            placeholder="예: 미팅룸 B, 화상 채팅 룸, 자택"
                                            className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-slate-100"
                                        />
                                    </div>

                                    {/* 세부 메모 설명 */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">설명/메모 (선택)</label>
                                        <textarea
                                            value={eventDesc}
                                            onChange={(e) => setEventDesc(e.target.value)}
                                            placeholder="일정에 필요한 중요 참고 사항이나 준비물 등을 기재해 보세요."
                                            rows="3"
                                            className="w-full px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none text-sm dark:text-slate-100 resize-none"
                                        ></textarea>
                                    </div>

                                    {/* 하단 제어 영역 */}
                                    <div className="pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between gap-3">
                                        {editingEvent ? (
                                            <button
                                                type="button"
                                                onClick={() => handleDeleteEvent(editingEvent.id)}
                                                className="px-4 py-2 bg-rose-50 hover:bg-rose-100 dark:bg-rose-950/30 text-rose-600 dark:text-rose-400 rounded-xl font-semibold text-sm transition-all"
                                            >
                                                삭제하기
                                            </button>
                                        ) : (
                                            <div></div>
                                        )}
                                        <div className="flex items-center space-x-2">
                                            <button
                                                type="button"
                                                onClick={() => setIsModalOpen(false)}
                                                className="px-4 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-semibold text-sm transition-all"
                                            >
                                                취소
                                            </button>
                                            <button
                                                type="submit"
                                                className="px-5 py-2 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-semibold text-sm shadow-md shadow-brand-500/10 transition-all"
                                            >
                                                저장
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 마운트
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
